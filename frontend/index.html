<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvivaVirtual AI Support</title>
  <meta name="description" content="Talk to AvivaVirtual AI support directly from your browser." />
  <style>
    :root {
      --brand: #0a7a6a;
      --brand-dark: #075f53;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 20px 45px rgba(0, 0, 0, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 10%, #f3faf8 0, #ffffff 45%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .hero {
      text-align: center;
      max-width: 700px;
    }

    .hero h1 {
      margin: 0 0 .5rem;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .hero p {
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    #ai-fab {
      position: fixed;
      right: 22px;
      bottom: 22px;
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 50%;
      background: var(--brand);
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      box-shadow: var(--shadow);
      z-index: 1000;
    }

    #ai-panel {
      position: fixed;
      right: 22px;
      bottom: 96px;
      width: min(380px, calc(100vw - 24px));
      height: min(72vh, 640px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
    }

    #ai-panel.open { display: flex; }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: .75rem;
      background: var(--brand);
      color: #fff;
      padding: 12px 14px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 650;
    }

    .small {
      font-size: .72rem;
      opacity: .9;
      margin-top: 3px;
    }

    .close-btn {
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 1.25rem;
      cursor: pointer;
      line-height: 1;
    }

    #chat {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      background: #fafafa;
    }

    .msg {
      max-width: 82%;
      margin: 8px 0;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: .92rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user {
      margin-left: auto;
      background: #e6f6f3;
      border: 1px solid #c8ebe4;
    }

    .msg.ai {
      margin-right: auto;
      background: #fff;
      border: 1px solid var(--border);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    .toolbar button {
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
    }

    .toolbar button.primary {
      background: var(--brand);
      color: #fff;
      border: 1px solid var(--brand);
    }

    .composer {
      display: flex;
      gap: 8px;
      padding: 0 12px 12px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    .composer input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: .94rem;
    }

    .composer button {
      border: 0;
      border-radius: 10px;
      padding: 0 14px;
      background: var(--brand-dark);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .status {
      font-size: .78rem;
      color: var(--muted);
      padding: 0 12px 10px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>AvivaVirtual AI Support</h1>
    <p>Tap the chat bubble to talk with support, send text messages, and stream live voice in the browser.</p>
  </section>

  <button id="ai-fab" aria-label="Open AI Support">💬</button>

  <aside id="ai-panel" aria-live="polite">
    <div class="panel-head">
      <div>
        <h2>AI Support Assistant</h2>
        <div class="small">Session: <span id="session-id"></span></div>
      </div>
      <button class="close-btn" id="close-panel" aria-label="Close">✕</button>
    </div>

    <div id="chat"></div>

    <div class="toolbar">
      <button id="start-voice" class="primary">🎤 Start Voice</button>
      <button id="stop-voice">⏹ Stop Voice</button>
    </div>

    <div class="composer">
      <input id="user-input" type="text" placeholder="Type your message..." />
      <button id="send-text">Send</button>
    </div>
    <div class="status" id="status">Idle</div>
  </aside>

  <script>
    const API_BASE = "https://api.avivavirtual.com";

    const fab = document.getElementById("ai-fab");
    const panel = document.getElementById("ai-panel");
    const closePanel = document.getElementById("close-panel");
    const chat = document.getElementById("chat");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-text");
    const startVoiceBtn = document.getElementById("start-voice");
    const stopVoiceBtn = document.getElementById("stop-voice");
    const status = document.getElementById("status");
    const sessionEl = document.getElementById("session-id");

    let mediaRecorder;
    let ws;
    let micStream;

    const sessionId = localStorage.getItem("aviva_session_id") || crypto.randomUUID();
    localStorage.setItem("aviva_session_id", sessionId);
    sessionEl.textContent = sessionId.slice(0, 8);

    function addMessage(text, who = "ai") {
      const bubble = document.createElement("div");
      bubble.className = `msg ${who}`;
      bubble.textContent = text;
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;
    }

    function setStatus(text) {
      status.textContent = text;
    }

    async function sendTextMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      addMessage(text, "user");
      setStatus("Sending message...");

      try {
        const response = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, session_id: sessionId }),
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        addMessage(data.reply || "No reply from assistant.", "ai");
        setStatus("Idle");
      } catch (error) {
        addMessage("Sorry — I could not reach support backend.", "ai");
        setStatus(`Error: ${error.message}`);
      }
    }

    async function startVoice() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        setStatus("Voice already running.");
        return;
      }

      try {
        setStatus("Requesting microphone...");
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        ws = new WebSocket("wss://api.avivavirtual.com/media-stream");

        ws.onopen = () => {
          setStatus("Voice connected. Listening...");
          addMessage("Voice session started.", "ai");

          mediaRecorder = new MediaRecorder(micStream, { mimeType: "audio/webm" });
          mediaRecorder.ondataavailable = async (event) => {
            if (!event.data || event.data.size === 0 || ws.readyState !== WebSocket.OPEN) return;
            const buf = await event.data.arrayBuffer();
            const b64 = btoa(String.fromCharCode(...new Uint8Array(buf)));
            ws.send(JSON.stringify({ event: "browser_audio", audio: b64, session_id: sessionId }));
          };
          mediaRecorder.start(300);
        };

        ws.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.text_delta) addMessage(payload.text_delta, "ai");
            if (payload.status) setStatus(payload.status);
          } catch {
            // Ignore non-JSON frames
          }
        };

        ws.onclose = () => {
          setStatus("Voice disconnected.");
          addMessage("Voice session stopped.", "ai");
        };

        ws.onerror = () => {
          setStatus("Voice connection error.");
        };
      } catch (error) {
        setStatus(`Mic/voice error: ${error.message}`);
      }
    }

    function stopVoice() {
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      if (micStream) micStream.getTracks().forEach((track) => track.stop());
      if (ws && ws.readyState <= WebSocket.OPEN) ws.close();
      setStatus("Voice stopped.");
    }

    fab.addEventListener("click", () => panel.classList.toggle("open"));
    closePanel.addEventListener("click", () => panel.classList.remove("open"));
    sendBtn.addEventListener("click", sendTextMessage);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") sendTextMessage();
    });
    startVoiceBtn.addEventListener("click", startVoice);
    stopVoiceBtn.addEventListener("click", stopVoice);

    addMessage("Hi! I’m your AI support assistant. Ask me anything.", "ai");
  </script>
</body>
</html>
