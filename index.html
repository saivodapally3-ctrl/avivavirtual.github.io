<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AvivaVirtual AI Support</title>
  <meta name="description" content="Talk to AvivaVirtual AI support directly from your browser with live chat and voice." />
  <style>
    :root {
      --bg: #f3f8f8;
      --card: #ffffff;
      --text: #0b1f1d;
      --muted: #5c7270;
      --brand: #0a7a6a;
      --brand-dark: #075c51;
      --line: #d7e5e4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at 15% 15%, #eaf7f4 0, var(--bg) 45%, #f9fcfc 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 72px 20px 120px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p.lead {
      max-width: 680px;
      margin: 20px auto 0;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .badges {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .badge {
      background: #e4f6f3;
      color: var(--brand-dark);
      border: 1px solid #c8ebe5;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    #assistant-toggle {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(145deg, var(--brand), #18a08b);
      color: #fff;
      font-size: 1.45rem;
      box-shadow: 0 16px 35px rgba(10, 122, 106, 0.38);
      cursor: pointer;
      z-index: 60;
    }

    .assistant-panel {
      position: fixed;
      right: 20px;
      bottom: 94px;
      width: min(390px, calc(100vw - 20px));
      height: min(600px, calc(100vh - 120px));
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.2);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 55;
    }

    .assistant-panel.open { display: flex; }

    .assistant-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: #0f8373;
      color: #fff;
    }

    .assistant-header h2 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .assistant-header small {
      opacity: 0.9;
      font-size: 0.75rem;
    }

    #connection-status {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .assistant-chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: linear-gradient(180deg, #ffffff, #f8fbfb);
    }

    .msg {
      max-width: 90%;
      margin-bottom: 8px;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.35;
      font-size: 0.94rem;
      white-space: pre-wrap;
    }

    .msg.user {
      margin-left: auto;
      background: #e6f4f2;
      border: 1px solid #cae8e3;
    }

    .msg.ai {
      margin-right: auto;
      background: #f3f7f7;
      border: 1px solid #e2eceb;
    }

    .assistant-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    #text-input {
      width: 100%;
      border: 1px solid #cbdbda;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
      outline: none;
    }

    .row {
      display: flex;
      gap: 8px;
      padding: 0 10px 12px;
      background: #fff;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
    }

    .btn {
      flex: 1;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-ghost {
      background: #fff;
      border-color: #c8d9d8;
      color: #244341;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>AvivaVirtual AI Support</h1>
    <p class="lead">Live voice + chat assistant for avivavirtual.com. Open the widget in the bottom-right corner to chat instantly, or start voice mode for real-time support.</p>
    <div class="badges">
      <span class="badge">Realtime chat</span>
      <span class="badge">Voice ready</span>
      <span class="badge">Session tracking</span>
      <span class="badge">GitHub Pages compatible</span>
    </div>
  </main>

  <button id="assistant-toggle" aria-label="Open AI assistant">💬</button>

  <section id="assistant-panel" class="assistant-panel" aria-live="polite">
    <header class="assistant-header">
      <div>
        <h2>AvivaVirtual Assistant</h2>
        <small id="session-label"></small>
      </div>
      <span id="connection-status">Idle</span>
    </header>

    <div id="assistant-chat" class="assistant-chat"></div>

    <div class="assistant-controls">
      <input id="text-input" type="text" placeholder="Ask anything…" />
      <button id="send-btn" class="btn btn-primary" type="button">Send</button>
    </div>

    <div class="row">
      <button id="voice-start" class="btn btn-ghost" type="button">🎤 Start Voice</button>
      <button id="voice-stop" class="btn btn-ghost" type="button">⏹ Stop</button>
    </div>
  </section>

  <script>
    const API_BASE = "https://api.avivavirtual.com";
    const panel = document.getElementById("assistant-panel");
    const toggle = document.getElementById("assistant-toggle");
    const chat = document.getElementById("assistant-chat");
    const input = document.getElementById("text-input");
    const sendBtn = document.getElementById("send-btn");
    const statusEl = document.getElementById("connection-status");

    const voiceStartBtn = document.getElementById("voice-start");
    const voiceStopBtn = document.getElementById("voice-stop");

    const SESSION_KEY = "avivavirtual_session_id";
    const sessionId = localStorage.getItem(SESSION_KEY) || crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);
    document.getElementById("session-label").textContent = `Session: ${sessionId.slice(0, 8)}`;

    let mediaStream = null;
    let mediaRecorder = null;
    let voiceSocket = null;

    function addMessage(text, role = "ai") {
      const el = document.createElement("div");
      el.className = `msg ${role}`;
      el.textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    toggle.addEventListener("click", () => {
      panel.classList.toggle("open");
    });

    async function sendTextMessage() {
      const text = input.value.trim();
      if (!text) return;
      addMessage(text, "user");
      input.value = "";
      setStatus("Thinking…");

      try {
        const response = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            text,
            session_id: sessionId,
            source: "github-pages-widget"
          })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        addMessage(data.reply || "I could not generate a reply right now.", "ai");
        setStatus("Idle");
      } catch (error) {
        addMessage("I couldn't reach support backend. Please try again.", "ai");
        setStatus("Offline");
        console.error(error);
      }
    }

    sendBtn.addEventListener("click", sendTextMessage);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") sendTextMessage();
    });

    voiceStartBtn.addEventListener("click", async () => {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        voiceSocket = new WebSocket(`${API_BASE.replace("https", "wss")}/media-stream`);

        voiceSocket.onopen = () => {
          setStatus("Voice connected");
          addMessage("Voice session started. You can speak now.", "ai");

          mediaRecorder = new MediaRecorder(mediaStream);
          mediaRecorder.ondataavailable = async (event) => {
            if (!event.data || event.data.size === 0) return;
            const buffer = await event.data.arrayBuffer();
            const uint = new Uint8Array(buffer);
            if (voiceSocket && voiceSocket.readyState === WebSocket.OPEN) {
              voiceSocket.send(uint);
            }
          };
          mediaRecorder.start(250);
        };

        voiceSocket.onmessage = (event) => {
          try {
            const payload = JSON.parse(event.data);
            if (payload.text) addMessage(payload.text, "ai");
          } catch (error) {
            console.warn("Non-JSON voice message", error);
          }
        };

        voiceSocket.onerror = () => setStatus("Voice error");
        voiceSocket.onclose = () => setStatus("Idle");
      } catch (error) {
        setStatus("Mic blocked");
        addMessage("Microphone access is required for voice mode.", "ai");
        console.error(error);
      }
    });

    voiceStopBtn.addEventListener("click", () => {
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      if (voiceSocket && voiceSocket.readyState === WebSocket.OPEN) voiceSocket.close();
      if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
      setStatus("Idle");
      addMessage("Voice session ended.", "ai");
    });

    addMessage("Hi! I'm your AvivaVirtual assistant. Ask me anything.", "ai");
  </script>
</body>
</html>
