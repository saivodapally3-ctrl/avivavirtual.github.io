<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="70%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1A9882"/>
      <stop offset="100%" stop-color="#071525"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A7A6A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A7A6A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="900" cy="180" r="400" fill="url(#glow)"/>
  <circle cx="200" cy="500" r="250" fill="url(#glow)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#0A7A6A"/>
  <path d="M94 118 L103 118 L107 110 L112 125 L118 100 L123 118 L127 114 L138 114" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="136" cy="96" r="8" fill="#14A68F"/>
  <circle cx="136" cy="96" r="4.5" fill="white"/>

  <!-- Brand name -->
  <text x="172" y="108" font-family="Georgia, serif" font-size="40" font-weight="700" fill="white" letter-spacing="-0.5">AvivaVirtual</text>
  <text x="173" y="136" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.5)" letter-spacing="3">VIRTUAL CARE &amp; TECH SUPPORT</text>

  <!-- Divider -->
  <line x1="80" y1="190" x2="280" y2="190" stroke="#0A7A6A" stroke-width="2.5"/>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1">Care That Comes</text>
  <text x="80" y="370" font-family="Georgia, serif" font-size="62" font-weight="700" fill="#14A68F" font-style="italic" letter-spacing="-1">To You, Always On.</text>

  <!-- Subheadline -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.55)">24/7 Virtual Health Care &amp; Remote Tech Support Across Canada</text>

  <!-- Pills -->
  <rect x="80" y="468" width="155" height="36" rx="18" fill="rgba(10,122,106,0.25)" stroke="rgba(10,122,106,0.5)" stroke-width="1"/>
  <text x="158" y="491" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">🇨🇦 Canada-Wide</text>

  <rect x="248" y="468" width="160" height="36" rx="18" fill="rgba(10,122,106,0.25)" stroke="rgba(10,122,106,0.5)" stroke-width="1"/>
  <text x="328" y="491" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">⚡ &lt;2min Response</text>

  <rect x="422" y="468" width="145" height="36" rx="18" fill="rgba(10,122,106,0.25)" stroke="rgba(10,122,106,0.5)" stroke-width="1"/>
  <text x="495" y="491" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.75)" text-anchor="middle">🌐 Bilingual EN/FR</text>

  <!-- URL -->
  <text x="1120" y="591" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="end">avivavirtual.com</text>

  <!-- Right decorative stat cards -->
  <rect x="820" y="280" width="300" height="90" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="970" y="325" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#14A68F" text-anchor="middle">97%</text>
  <text x="970" y="352" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="middle">First-Session Resolution Rate</text>

  <rect x="820" y="390" width="300" height="90" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="970" y="435" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#14A68F" text-anchor="middle">4.9 ★</text>
  <text x="970" y="462" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.45)" text-anchor="middle">Customer Satisfaction Score</text>
</svg>
